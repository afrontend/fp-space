name: Update Demo GIF

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install asciinema
        run: pip3 install asciinema

      - name: Install agg
        run: |
          AGG_URL="https://github.com/asciinema/agg/releases/download/v1.4.3/agg-x86_64-unknown-linux-gnu"
          curl -L "$AGG_URL" -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg

      - name: Generate demo GIF
        run: bash scripts/make-demo.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update demo GIF"
          git push
